# Validate Mintlify docs on every change to main (and on PRs). Same as `npm run validate`
# locally / Husky (structural `mintlify validate` + `mintlify broken-links`).
#
# The Mintlify GitHub App may still deploy on push unless you enable **Blocking** CI checks
# in the Mintlify dashboard (Add-ons). See `.github/README.md`.
#
# Workflow runs on all pushes/PRs to `main` (no path filters) so a single required status
# check name is always present for branch protection.

name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate Mintlify docs (same as pre-commit)
        run: npm run validate
